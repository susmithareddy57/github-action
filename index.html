<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My First HTML Page</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f4f4;margin:0}
header{background:#0078D4;color:#fff;padding:20px;text-align:center}
main{max-width:800px;margin:30px auto;background:#fff;padding:20px;border-radius:10px}
button{background:#0078D4;color:#fff;border:none;padding:10px 20px;border-radius:5px;cursor:pointer}
</style>
</head>
<body>
<header><h1>Welcome to My Website</h1><p>My First HTML Page</p></header>
<main>
<h2>About</h2>
<p>This is a simple HTML page with CSS and JavaScript.</p>
<button onclick="showMessage()">Click Me</button>
<p id="message"></p>
</main>
<script>
function showMessage(){
document.getElementById('message').textContent='Hello! You clicked the button successfully.';
}
</script>
</body>
</html>
